version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: Europe/Paris
    open-pull-requests-limit: 20
    cooldown:
      default-days: 3
    # Actions are pinned to major tags (e.g. actions/checkout@v6).
    # Without this ignore, Dependabot would propose pinning the exact version (v6 -> v6.0.2).
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: Europe/Paris
    open-pull-requests-limit: 20
    cooldown:
      default-days: 3
    groups:
      gomod-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      gomod-major:
        applies-to: version-updates
        update-types:
          - "major"
      gomod-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      timezone: Europe/Paris
    open-pull-requests-limit: 20
    versioning-strategy: increase
    cooldown:
      default-days: 3
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      npm-major:
        applies-to: version-updates
        update-types:
          - "major"
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: Europe/Paris
    open-pull-requests-limit: 20
    cooldown:
      default-days: 3
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    groups:
      docker-minor:
        applies-to: version-updates
        update-types:
          - "minor"
      docker-major:
        applies-to: version-updates
        update-types:
          - "major"
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
