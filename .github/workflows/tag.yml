name: Release

on:
  push:
    branches:
      - main
    paths:
      - web/package.json

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  tag:
    name: Create release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.value }}
      tag_created: ${{ steps.create.outputs.created }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' web/package.json)
          echo "value=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        if: steps.version.outputs.value != 'v0.0.0'
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.value }}" \
            | grep -q "${{ steps.version.outputs.value }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        id: create
        if: >-
          steps.version.outputs.value != 'v0.0.0' &&
          steps.check.outputs.exists == 'false'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.value }}"
          REMOTE="https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}"
          git push "${REMOTE}" "${{ steps.version.outputs.value }}"
          echo "created=true" >> "$GITHUB_OUTPUT"

  docker:
    name: Build and push
    runs-on: ubuntu-latest
    needs: tag
    if: needs.tag.outputs.tag_created == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.version }}

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image version
        id: version
        run: |
          echo "value=${{ needs.tag.outputs.version }}" | sed 's/^v//' >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
